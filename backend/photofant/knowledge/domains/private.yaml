# Domäne "Private" — Wissen über reale, dir bekannte Personen und Haustiere.
# Anders als "Movies" ist sie als privat markiert: solche Entities werden NIE mit
# Web-/Fremdwissen angereichert (Konzept-ADR-009). Sie entstehen nur über den
# Interview-Mode (P27 Phase 4) oder das manuelle Anlegen — nie über den KI-Import.
# Wird beim ersten Vault-Zugriff nach <vault>/domains/private.yaml kopiert und ist
# danach frei editierbar (Beziehungstypen an die eigene Familie/Freundeskreis anpassen).
name: Private
private: true

# 'name' steht im Frontmatter (type:), 'folder' ist der Ordner (Plural) im Vault.
# 'fields' sind die Merkmale des Typs: Was hier steht, zeigt die App als eigene Zeile
# mit Wert und Herkunft an — und daraus errechnet sich der Vollständigkeits-Wert.
# 'question' (optional, pro Feld): wird im Interview gefragt, {name} wird durch den
# Namen der befragten Person ersetzt. Fehlt sie, wird das Merkmal nicht gefragt.
# 'preferred_sources' gibt es hier bewusst nicht — private Entities gehen nie ins Netz.
entity_types:
  - name: Person
    folder: people
    fields:
      - key: spitzname
        label: Spitzname
        question: Wie nennst du {name} normalerweise?
      - key: geburtstag
        label: Geburtstag
        question: Wann hat {name} Geburtstag?
      - key: geburtsort
        label: Geburtsort
        question: Wo ist {name} geboren?
      - key: nationalitaet
        label: Nationalität
        question: Welche Nationalität hat {name}?
      - key: beruf
        label: Beruf
        question: Was macht {name} beruflich?
      - key: wohnort
        label: Wohnort
        question: Wo wohnt {name}?
      - key: telefon
        label: Telefonnummer
        question: Wie erreichst du {name} am schnellsten (Telefonnummer)?
      - key: vorlieben
        label: Vorlieben
        question: Was mag {name} besonders — Hobbys, Vorlieben, Eigenheiten?
      - key: beziehung
        label: Beziehungsstatus
        question: In welcher Beziehung steht {name} — Partnerschaft, Familie?
      - key: kennengelernt_von
        label: Kenne ich von
        question: Woher kennst du {name} — Schule, Arbeit, Verein?
      - key: kennengelernt_durch
        label: Kenne ich durch
        question: Durch wen hast du {name} kennengelernt?
  - name: Pet
    folder: pets
    fields:
      - key: art
        label: Art
        question: Was für ein Tier ist {name}?
      - key: geburtstag
        label: Geburtstag
        question: Wann hat {name} Geburtstag?
      - key: eigenheiten
        label: Eigenheiten
        question: Was ist an {name} besonders?

# Beziehungstypen für den privaten Kreis. Der Knowledge Graph wird ausschließlich
# aus diesen Beziehungen erzeugt.
relationship_types:
  - family
  - partner
  - parent_of
  - child_of
  - sibling_of
  - friend
  - colleague
  - owner_of
  - pet_of
