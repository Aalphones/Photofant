<button class="iconbtn menu-btn" (click)="menuToggle.emit()" aria-label="Menü öffnen">
  <pf-icon name="menu" [size]="20" />
</button>

<span class="top-title">{{ title() }}</span>

<div class="search">
  <pf-search-box />
</div>

<div class="top-actions">
  <pf-job-pill
    [activeCount]="activeJobs()"
    [isOpen]="isDockOpen()"
    (toggle)="dockToggle.emit()"
  />
</div>
