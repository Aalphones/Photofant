<div class="legend-scrim" (click)="onClose()"></div>

<div class="legend-panel" role="dialog" aria-label="Tastaturkürzel">
  <div class="legend-head">
    <span class="legend-title">Tastaturkürzel</span>
    <button class="iconbtn" (click)="onClose()" aria-label="Schließen">
      <pf-icon name="x" [size]="18" />
    </button>
  </div>

  <div class="legend-body">
    @for (group of groupByContext(); track group.context) {
      <div class="legend-group">
        <div class="legend-ctx">{{ group.context }}</div>
        @for (entry of group.entries; track entry.key) {
          <div class="legend-row">
            <kbd class="legend-kbd">{{ entry.key }}</kbd>
            <span class="legend-desc">{{ entry.description }}</span>
          </div>
        }
      </div>
    }

    @if (entries().length === 0) {
      <p class="legend-empty">Keine Kürzel registriert.</p>
    }
  </div>
</div>
