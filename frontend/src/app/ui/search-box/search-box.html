<div
  class="search-box"
  [class.search-box--open]="isOpen() && suggestions().length > 0"
  [class.search-box--drop]="isDropTarget()"
  (dragenter)="onDragEnter($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
>
  <pf-icon name="search" [size]="16" />

  <input
    class="search-box__input"
    type="search"
    [placeholder]="semanticMode() ? 'Bildinhalt beschreiben, z. B. »roter Sportwagen«…' : 'Tags, Personen & Bilder suchen…'"
    [value]="localQuery()"
    (input)="onInput($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (keydown)="onKeydown($event)"
    aria-label="Suche"
    aria-autocomplete="list"
    aria-controls="pf-search-dropdown"
    [attr.aria-activedescendant]="activeIndex() >= 0 ? 'pf-suggestion-' + activeIndex() : null"
    autocomplete="off"
  />

  @if (localQuery()) {
    <button
      class="search-box__clear"
      type="button"
      (click)="clearSearch()"
      aria-label="Suche löschen"
    >
      <pf-icon name="x" [size]="14" />
    </button>
  }

  <!-- Semantik-Modus (P36 Phase 4): sucht nach Bildinhalt statt nach Tag-/Caption-Text -->
  <button
    class="search-box__semantic-toggle"
    [class.search-box__semantic-toggle--active]="semanticMode()"
    type="button"
    (click)="toggleSemanticMode()"
    [attr.aria-pressed]="semanticMode()"
    title="Semantische Suche: nach Bildinhalt suchen statt nach Tag-Text"
    aria-label="Semantische Suche umschalten"
  >
    <pf-icon name="sparkle" [size]="16" />
  </button>

  <!-- Reverse Image Search: Bild ablegen oder wählen → ähnliche Bilder finden -->
  <button
    class="search-box__upload"
    [class.search-box__upload--busy]="isReverseSearching()"
    type="button"
    (click)="onUploadClick()"
    [disabled]="isReverseSearching()"
    title="Bild ablegen oder wählen, um ähnliche zu finden"
    aria-label="Ähnliche Bilder per Bild suchen"
  >
    <pf-icon name="scan" [size]="16" />
  </button>
  <input
    #fileInput
    class="search-box__file"
    type="file"
    accept="image/*"
    (change)="onFilePicked($event)"
    hidden
  />

  @if (isDropTarget()) {
    <div class="search-box__drop-hint">Bild ablegen → Ähnliche finden</div>
  }
</div>

@if (reverseError()) {
  <div class="search-box__error" role="alert">{{ reverseError() }}</div>
}

<!-- Autocomplete dropdown -->
@if (isOpen() && suggestions().length > 0) {
  <div class="search-box__dropdown" id="pf-search-dropdown" role="listbox">
    @for (item of suggestions(); track item.type + item.text; let index = $index) {
      <button
        class="search-box__suggestion"
        [class.search-box__suggestion--person]="item.type === 'person'"
        [class.search-box__suggestion--semantic]="item.type === 'semantic'"
        [class.search-box__suggestion--active]="activeIndex() === index"
        [id]="'pf-suggestion-' + index"
        [attr.aria-selected]="activeIndex() === index"
        type="button"
        role="option"
        (click)="selectSuggestion(item)"
      >
        <pf-icon
          [name]="item.type === 'person' ? 'user' : item.type === 'semantic' ? 'sparkle' : item.type === 'class' ? 'layers' : 'tag'"
          [size]="12"
        />
        <span class="search-box__suggestion-text">{{ item.text }}</span>
        @if (item.badge) {
          <span class="search-box__suggestion-badge">{{ item.badge }}</span>
        } @else if (item.count != null) {
          <span class="search-box__suggestion-count">{{ item.count }}</span>
        }
      </button>
    }
  </div>
}
