<div class="bulkbar__inner">
  <span class="bulkbar__count">{{ countLabel() }}</span>
  <div class="bulkbar__divider"></div>

  @if (showTagInput()) {
    <div class="bulkbar__tag-input">
      <pf-icon name="tag" [size]="14" />
      <input
        class="bulkbar__tag-field"
        [value]="tagInput()"
        (input)="tagInput.set($any($event.target).value)"
        (keydown)="onTagKeyDown($event)"
        (blur)="applyTags()"
        placeholder="Tags kommagetrennt…"
        autofocus
      />
    </div>
  } @else {
    <button class="bulkbar__action" (click)="openTagInput()">
      <pf-icon name="tag" [size]="15" />
      Taggen
    </button>
  }

  <div class="bulkbar__divider"></div>

  <div class="bulkbar__album">
    <button class="bulkbar__action" (click)="toggleAlbumMenu()">
      <pf-icon name="album" [size]="15" />
      Zu Album
    </button>
    @if (showAlbumMenu()) {
      <div class="bulkbar__album-menu">
        @for (album of albums(); track album.id) {
          <button class="bulkbar__album-item" (click)="pickAlbum(album.id)">
            <pf-icon name="album" [size]="13" />
            {{ album.name }}
          </button>
        }
        @if (albums().length === 0) {
          <span class="bulkbar__album-empty">Keine Alben angelegt</span>
        }
      </div>
    }
  </div>

  <div class="bulkbar__divider"></div>
  <button class="bulkbar__action" (click)="openRerunDialog()">
    <pf-icon name="refresh" [size]="15" />
    Klassifizieren
  </button>

  <div class="bulkbar__divider"></div>
  <button class="bulkbar__action" (click)="openEditDialog()">
    <pf-icon name="crop" [size]="15" />
    Bearbeiten
  </button>

  @if (count() >= 2) {
    <div class="bulkbar__divider"></div>
    <button class="bulkbar__action" (click)="triggerDupeScan()">
      <pf-icon name="compare" [size]="15" />
      Duplikate prüfen
    </button>
  }

  <div class="bulkbar__divider"></div>
  <button class="bulkbar__close" (click)="onClose()" aria-label="Auswahl aufheben">
    <pf-icon name="x" [size]="16" />
  </button>
</div>
