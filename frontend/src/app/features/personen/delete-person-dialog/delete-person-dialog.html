<div class="delete-person-dialog__backdrop" (click)="onBackdrop($event)">
  <div class="delete-person-dialog__card">
    <div class="delete-person-dialog__header">
      <h3 class="delete-person-dialog__title">Person löschen</h3>
      <button class="delete-person-dialog__close" (click)="close.emit()">
        <pf-icon name="x" [size]="18" />
      </button>
    </div>

    <div class="delete-person-dialog__body">
      <div class="delete-person-dialog__confirm-person">
        @if (portraitUrl(person()); as url) {
          <img class="delete-person-dialog__avatar" [src]="url" alt="" />
        } @else {
          <div class="delete-person-dialog__avatar delete-person-dialog__avatar--empty">
            <pf-icon name="user" [size]="24" />
          </div>
        }
        <div>
          <div class="delete-person-dialog__name">{{ person().name ?? '—' }}</div>
          <div class="delete-person-dialog__count">{{ person().count }} Bilder</div>
        </div>
      </div>

      <p class="delete-person-dialog__text">
        <strong>{{ person().name }}</strong> ({{ person().count }} Bilder) wird gelöscht.
        Die Fotos bleiben erhalten und wandern zu „Unbekannt" — nur die Person
        und ihr Ordner sind danach weg.
      </p>
    </div>

    <div class="delete-person-dialog__footer">
      <button class="delete-person-dialog__btn delete-person-dialog__btn--cancel" (click)="close.emit()">
        Abbrechen
      </button>
      <button class="delete-person-dialog__btn delete-person-dialog__btn--danger" (click)="onConfirm()">
        <pf-icon name="trash" [size]="14" />
        Löschen
      </button>
    </div>
  </div>
</div>
