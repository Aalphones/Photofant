<div class="create-person-dialog__backdrop" (click)="onBackdrop($event)">
  <div class="create-person-dialog__card">
    <div class="create-person-dialog__header">
      <h3 class="create-person-dialog__title">Neue Person</h3>
      <button class="create-person-dialog__close" (click)="close.emit()">
        <pf-icon name="x" [size]="18" />
      </button>
    </div>

    <div class="create-person-dialog__body">
      <input
        class="create-person-dialog__input"
        placeholder="Name eingeben…"
        autofocus
        [value]="nameValue()"
        (input)="nameValue.set($any($event.target).value)"
        (keydown)="onKeydown($event)"
      />
    </div>

    <div class="create-person-dialog__footer">
      <button class="create-person-dialog__btn create-person-dialog__btn--cancel" (click)="close.emit()">
        Abbrechen
      </button>
      <button
        class="create-person-dialog__btn create-person-dialog__btn--confirm"
        [disabled]="!canConfirm()"
        (click)="onConfirm()"
      >
        <pf-icon name="check" [size]="14" />
        Anlegen
      </button>
    </div>
  </div>
</div>
