<div class="link-entity-dialog__backdrop" (click)="onBackdrop($event)">
  <div class="link-entity-dialog__card">
    <div class="link-entity-dialog__header">
      <h3 class="link-entity-dialog__title">
        Wissen verknüpfen — {{ person().name ?? 'Unbekannt' }}
      </h3>
      <button class="link-entity-dialog__close" (click)="close.emit()" aria-label="Schließen">
        <pf-icon name="x" [size]="18" />
      </button>
    </div>

    <div class="link-entity-dialog__body">
      <input
        class="link-entity-dialog__input"
        placeholder="Nach vorhandenem Wissen suchen…"
        autofocus
        [value]="query()"
        (input)="onQueryInput($any($event.target).value)"
        (keydown)="onKeydown($event)"
      />

      <div class="link-entity-dialog__results">
        @for (entity of results(); track entity.id) {
          <button class="link-entity-dialog__result" type="button" (click)="onSelect(entity)">
            <pf-icon name="sparkle" [size]="13" />
            <span class="link-entity-dialog__result-title">{{ entity.title }}</span>
            <span class="link-entity-dialog__result-type">{{ entity.type }}</span>
          </button>
        } @empty {
          <p class="link-entity-dialog__hint">
            @if (hasQuery()) {
              Kein passendes Wissen gefunden. Neue Einträge legst du unter „Wissen" an.
            } @else {
              Tippe mindestens zwei Zeichen, um vorhandenes Wissen zu suchen.
            }
          </p>
        }
      </div>
    </div>
  </div>
</div>
