<div class="tastaturkuerzel__kopf">
  <h2>Tastaturkürzel</h2>
  <p>Klicke auf einen Eintrag, um ihn neu zu belegen. Dann die gewünschte Taste drücken.</p>
</div>

<div class="tastaturkuerzel__gruppe">
  @for (row of shortcutRows; track row.action) {
    <div class="tastaturkuerzel__zeile" [class.tastaturkuerzel__zeile--aktiv]="listeningAction() === row.action">
      <div class="tastaturkuerzel__aktion">{{ row.label }}</div>
      <div class="tastaturkuerzel__tasten">
        @if (listeningAction() === row.action) {
          <span class="tastaturkuerzel__warte-hinweis">Taste drücken …</span>
        } @else {
          <button
            class="tastaturkuerzel__taste"
            title="Klicken um Taste zu ändern"
            (click)="startListening(row.action)"
          >{{ formatKeys(resolvedShortcuts().get(row.action)) }}</button>
        }
      </div>
    </div>
  }
</div>

<div class="tastaturkuerzel__fusszeile">
  <button class="tastaturkuerzel__schaltfläche tastaturkuerzel__schaltfläche--rahmen" (click)="resetShortcuts()">Auf Standard zurücksetzen</button>
</div>
