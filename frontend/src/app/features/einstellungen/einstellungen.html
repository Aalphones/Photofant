<div class="einstellungen__wrapper">

  <!-- ── linke Sektions-Nav ──────────────────────────────── -->
  <aside class="einstellungen__nav" [class.einstellungen__nav--offen]="mobileOpen()">
    <div class="einstellungen__nav-title">Einstellungen</div>
    @for (sect of sections; track sect.id) {
      <button
        class="einstellungen__nav-item"
        [class.einstellungen__nav-item--aktiv]="activeSection() === sect.id"
        (click)="goSection(sect.id)"
      >
        <div class="einstellungen__nav-icon">
          <pf-icon [name]="sect.icon" [size]="16" />
        </div>
        {{ sect.label }}
      </button>
    }
  </aside>

  <!-- ── rechter Inhaltsbereich ──────────────────────────── -->
  <div class="einstellungen__body" [class.einstellungen__body--verborgen]="!mobileOpen()">

    <!-- Mobile: Zurück-Button -->
    <div class="einstellungen__nav-back" (click)="goBack()">
      <pf-icon name="arrowLeft" [size]="16" />
      Einstellungen
    </div>

    @switch (activeSection()) {
      @case ('bibliothek')   { <pf-einstellungen-bibliothek /> }
      @case ('verarbeitung') { <pf-einstellungen-verarbeitung /> }
      @case ('darstellung')  { <pf-einstellungen-darstellung /> }
      @case ('bearbeitung')  { <pf-einstellungen-bearbeitung /> }
      @case ('tags')         { <pf-einstellungen-tags /> }
      @case ('shortcuts')    { <pf-einstellungen-tastaturkuerzel /> }
      @case ('backup')       { <pf-einstellungen-backup-wartung /> }
      @case ('info')         { <pf-einstellungen-info /> }
    }

  </div><!-- /einstellungen__body -->
</div><!-- /einstellungen__wrapper -->
