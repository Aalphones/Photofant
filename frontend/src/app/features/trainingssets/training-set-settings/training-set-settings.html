<div class="set-head">
  <div class="set-head__title">
    <pf-icon name="settings" [size]="14" />
    <span>Set-Einstellungen</span>
  </div>
  <button class="iconbtn" (click)="onClose()" aria-label="Schließen">
    <pf-icon name="x" [size]="16" />
  </button>
</div>

<div class="rules-block">
  <div class="rules-block__label">Trigger-Word</div>
  <input
    class="field-input"
    [value]="triggerWordDraft()"
    (input)="triggerWordDraft.set($any($event.target).value)"
    (blur)="save()"
    placeholder="z.B. lena_v1"
  />
</div>

<div class="rules-block">
  <div class="rules-block__label">Prefix</div>
  <input
    class="field-input"
    [value]="prefixDraft()"
    (input)="prefixDraft.set($any($event.target).value)"
    (blur)="save()"
    placeholder="wird jeder Caption vorangestellt"
  />
</div>

<div class="rules-block">
  <div class="rules-block__label">Suffix</div>
  <input
    class="field-input"
    [value]="suffixDraft()"
    (input)="suffixDraft.set($any($event.target).value)"
    (blur)="save()"
    placeholder="wird jeder Caption angehängt"
  />
</div>

<div class="rules-block">
  <div class="rules-block__label">Train/Val-Split · {{ (splitRatioDraft() * 100).toFixed(0) }}% / {{ (100 - splitRatioDraft() * 100).toFixed(0) }}%</div>
  <input
    class="split-slider"
    type="range"
    min="0.5"
    max="1"
    step="0.05"
    [value]="splitRatioDraft()"
    (input)="splitRatioDraft.set($any($event.target).valueAsNumber)"
    (change)="save()"
  />
</div>

<div class="rules-foot">
  <pf-icon name="info" [size]="13" />
  <span>Wirkt beim Export (Sidecar-Captions) und beim Train/Val-Split — Galerie-Captions bleiben unangetastet.</span>
</div>
