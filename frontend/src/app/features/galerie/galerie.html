<pf-sub-toolbar (railToggle)="railOpen.set(!railOpen())" />

<div class="galerie__body">
  @if (railOpen()) {
    <pf-filter-rail (close)="railOpen.set(false)" />
  }

  <div class="galerie__main">
    <!-- Selection mode toggle -->
    <div class="galerie__sel-bar">
      <button
        class="galerie__sel-btn"
        [class.galerie__sel-btn--on]="selectionMode()"
        (click)="toggleSelectionMode()"
        [attr.aria-pressed]="selectionMode()"
      >
        <pf-icon name="select" [size]="15" />
        <span>{{ selectionMode() ? 'Auswählen beenden' : 'Auswählen' }}</span>
      </button>
    </div>

    @if (isEmpty()) {
      <div class="galerie-empty">
        <div class="empty-icon">
          <pf-icon name="gallery" [size]="40" />
        </div>
        <h2 class="empty-title">Noch keine Bilder</h2>
        <p class="empty-sub">Bilder hierher ziehen oder den Import-Button oben rechts nutzen.</p>
      </div>
    } @else {
      <pf-galerie-grid
        [groups]="groups()"
        [density]="density()"
        [isLoading]="isLoading()"
        [selectionMode]="selectionMode()"
        [selectedIds]="selectedIds()"
        (openAsset)="onOpenAsset($event)"
        (selectAll)="onSelectAll($event)"
        (loadMore)="onLoadMore()"
      />
    }
  </div>
</div>

@if (lightboxId() != null) {
  <pf-lightbox />
}

@if (selectedCount() > 0) {
  <pf-bulk-bar
    [count]="selectedCount()"
    (close)="onBulkClose()"
    (tagAction)="onBulkTag($event)"
  />
}
