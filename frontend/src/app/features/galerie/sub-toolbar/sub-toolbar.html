<div class="subbar__left">
  <button class="subbar__btn subbar__btn--filter" (click)="railToggle.emit()" title="Filter ein-/ausblenden">
    <pf-icon name="filter" [size]="14" />
  </button>

  <span class="subbar__count">
    {{ total() }} {{ hasActiveFilters() ? 'Treffer' : 'Bilder' }}
  </span>

  @if (hasActiveFilters()) {
    <span class="subbar__div"></span>
    @for (chip of chips(); track chip.label) {
      <span class="subbar__chip">
        @if (chip.thumbnailUrl) {
          <img class="subbar__chip-avatar" [src]="chip.thumbnailUrl" alt="" />
        }
        <span class="subbar__chip-key">{{ chip.chipKey }}:</span>
        <span class="subbar__chip-label">{{ chip.label }}</span>
        <button class="subbar__chip-x" (click)="removeChip(chip)" [attr.aria-label]="'Filter entfernen: ' + chip.label">
          <pf-icon name="x" [size]="11" />
        </button>
      </span>
    }
    <button class="subbar__clear" (click)="clearAllFilters()">Alle entfernen</button>
  }
</div>

<div class="subbar__tools">
  <!-- Media type segment: Fotos | Gesichter -->
  <div class="subbar__seg">
    @for (type of MEDIA_TYPE_LIST; track type) {
      <button
        class="subbar__seg-btn"
        [class.subbar__seg-btn--on]="mediaType() === type"
        (click)="setMediaType(type)"
      >
        {{ MEDIA_TYPE_LABELS[type] }}
      </button>
    }
  </div>

  <!-- Sort -->
  <button class="subbar__btn" (click)="cycleSortKey()">
    <pf-icon name="sort" [size]="15" />
    <span>{{ sortLabel() }}</span>
    <span class="subbar__order">{{ order() === 'asc' ? '↑' : '↓' }}</span>
  </button>

  <!-- Gruppierung -->
  <button class="subbar__btn" (click)="cycleGroup()" title="Gruppierung wechseln">
    <pf-icon name="layers" [size]="15" />
    <span>{{ groupLabel() }}</span>
  </button>

  <!-- Density -->
  <div class="subbar__seg">
    @for (item of DENSITIES; track item.key) {
      <button
        class="subbar__seg-btn subbar__seg-btn--icon"
        [class.subbar__seg-btn--on]="density() === item.key"
        (click)="setDensity(item.key)"
        [title]="'Dichte ' + item.key"
      >
        <pf-icon name="gallery" [size]="item.size" />
      </button>
    }
  </div>

  <!-- Auswählen -->
  <button
    class="subbar__btn subbar__btn--sel"
    [class.subbar__btn--sel-on]="selectionMode()"
    (click)="selToggle.emit()"
    [attr.aria-pressed]="selectionMode()"
  >
    <pf-icon name="select" [size]="14" />
    <span>{{ selectionMode() ? 'Beenden' : 'Auswählen' }}</span>
  </button>

  <!-- Workflow-Modus -->
  <button
    class="subbar__btn subbar__btn--workflow"
    [class.subbar__btn--workflow-on]="workflowMode()"
    (click)="workflowToggle.emit()"
    [attr.aria-pressed]="workflowMode()"
    title="ComfyUI-Workflow starten"
  >
    <pf-icon name="sparkle" [size]="14" />
    <span>Run</span>
  </button>
</div>
