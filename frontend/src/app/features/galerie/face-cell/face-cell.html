<div class="face-cell__img-wrap" [style.width.px]="cellSize()" [style.height.px]="cellSize()">
  <img
    class="face-cell__img"
    [src]="face().thumbnail_url"
    [alt]="label()"
    loading="lazy"
    draggable="false"
  />
</div>

<div class="face-cell__veil"></div>

@if (!isArmed()) {
  <button
    class="face-cell__pick"
    [class.face-cell__pick--selected]="isSelected()"
    (click)="onPickClick($event)"
    [attr.aria-label]="isSelected() ? 'Abwählen' : 'Auswählen'"
    [attr.aria-pressed]="isSelected()"
  >
    @if (isSelected()) {
      <pf-icon name="check" [size]="13" />
    }
  </button>
}

<div class="face-cell__info">
  <span class="face-cell__name">{{ label() }}</span>
  @if (scorePercent()) {
    <span class="face-cell__score">{{ scorePercent() }}</span>
  }
</div>

@if (face().is_upscaled) {
  <div class="face-cell__badge face-cell__badge--upscaled">
    <pf-icon name="sparkle" [size]="10" />
  </div>
}

@if (isStacked()) {
  <div class="face-cell__stack-badge" [title]="stackTooltip()">
    <pf-icon name="layers" [size]="11" />
    <span>{{ face().stack_size }}</span>
  </div>
}
