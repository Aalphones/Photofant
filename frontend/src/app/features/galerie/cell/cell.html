<div class="cell__img-wrap">
  <img
    class="cell__img"
    [src]="thumbnailSrc()"
    [alt]="'Bild ' + asset().id"
    loading="lazy"
    draggable="false"
  />
</div>

<div class="cell__veil"></div>

<!-- Selection checkbox (visible in selmode or when selected) -->
<button
  class="cell__pick"
  [class.cell__pick--selected]="isSelected()"
  (click)="onPickClick($event)"
  [attr.aria-label]="isSelected() ? 'Abwählen' : 'Auswählen'"
  [attr.aria-pressed]="isSelected()"
>
  @if (isSelected()) {
    <pf-icon name="check" [size]="13" />
  }
</button>

<button class="cell__fav" [class.cell__fav--on]="asset().favourite" (click)="onFavClick($event)" aria-label="Favorit">
  <pf-icon name="star" [size]="16" />
</button>

@if (badgeLabel()) {
  <div class="cell__badges">
    <span class="cell__badge cell__badge--{{ asset().source }}">{{ badgeLabel() }}</span>
  </div>
}

@if (hasVersions()) {
  <div class="cell__versions">
    <pf-icon name="layers" [size]="11" />
    <span>{{ asset().version_count }}</span>
  </div>
}
