@if (loading()) {
  <div class="rr-rail__empty">{{ loadingMessage() }}</div>
} @else if (items().length === 0) {
  <div class="rr-rail__empty">{{ emptyMessage() ?? 'Keine ähnlichen Bilder gefunden.' }}</div>
} @else {
  <div class="rr-rail__strip">
    @for (item of items(); track item.assetId) {
      <div class="rr-rail__card">
        <button
          class="rr-rail__thumb"
          (click)="cardClick.emit(item.assetId)"
          [attr.aria-label]="'Asset #' + item.assetId + ' öffnen'"
        >
          <img class="rr-rail__img" [src]="thumbnailUrl(item.assetId)" alt="" />
          <span class="rr-rail__badge">{{ scorePercent(item) }}%</span>
        </button>
        @if (explainLabel(); as label) {
          <pf-explainability-popover
            class="rr-rail__explain"
            [label]="label"
            [open]="explainOpenId() === item.assetId"
            [payload]="explainPayload()"
            [loading]="explainLoading()"
            (triggerClicked)="onExplainClick(item.assetId)"
            (closeRequested)="explainClose.emit()"
          />
        }
      </div>
    }
  </div>
}
