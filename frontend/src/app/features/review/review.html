<div class="review__tabs">
  <button
    class="review__tab"
    [class.review__tab--active]="activeTab() === 'gesichter'"
    (click)="goTab('gesichter')"
  >
    Gesichter
  </button>
  <button
    class="review__tab"
    [class.review__tab--active]="activeTab() === 'duplikate'"
    (click)="goTab('duplikate')"
  >
    Duplikate
  </button>
</div>

@switch (activeTab()) {
  @case ('duplikate') {
    <pf-review-dupes />
  }
  @case ('gesichter') {
    <pf-review-faces />
  }
}
