<div class="flux2-panel__scroll">

  <!-- Templates (Prompt-Vorlagen) -->
  <div class="flux2-panel__section">
    <div class="flux2-panel__label">Vorlagen</div>
    <div class="flux2-panel__template-grid">
      @for (template of templates(); track template.id) {
        <button
          class="flux2-panel__template"
          [class.flux2-panel__template--active]="selectedTemplateId() === template.id"
          (click)="applyTemplate(template)"
        >
          <div class="flux2-panel__template-name">{{ template.name }}</div>
          <div class="flux2-panel__template-prompt">{{ template.prompt }}</div>
        </button>
      } @empty {
        <div class="flux2-panel__empty">
          Noch keine Vorlagen — unter Einstellungen → Bearbeitung anlegen.
        </div>
      }
    </div>
  </div>

  <!-- Prompt -->
  <div class="flux2-panel__section">
    <div class="flux2-panel__label">Prompt</div>
    <textarea
      class="flux2-panel__textarea"
      rows="4"
      [value]="prompt()"
      placeholder="Beschreibe den gewünschten Edit …"
      (input)="onPromptInput($event)"
    ></textarea>
  </div>

  <!-- Auflösung (nur falls der Workflow sie exponiert) -->
  @if (resolution(); as res) {
    <div class="flux2-panel__section">
      <pf-resolution-field [resolution]="res" [(megapixels)]="megapixels" />
    </div>
  }

  <!-- Generate button -->
  <button
    class="flux2-panel__generate"
    [disabled]="!canGenerate()"
    (click)="onGenerate()"
  >
    @if (generating()) {
      <div class="flux2-panel__spinner"></div>
      Wird generiert …
    } @else {
      <pf-icon name="pencil" [size]="15" />
      Edit generieren
    }
  </button>

</div>
