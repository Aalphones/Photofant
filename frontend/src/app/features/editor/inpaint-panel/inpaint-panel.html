<div class="inpaint-panel__scroll">

  <!-- Brush controls -->
  <div class="inpaint-panel__section">
    <div class="inpaint-panel__label">Pinsel</div>

    <div class="inpaint-panel__brush-row">
      <button
        class="inpaint-panel__mode-btn"
        [class.inpaint-panel__mode-btn--active]="brushMode() === 'paint'"
        (click)="brushMode() !== 'paint' && toggleBrushMode()"
      >
        <pf-icon name="pencil" [size]="14" />
        Malen
      </button>
      <button
        class="inpaint-panel__mode-btn"
        [class.inpaint-panel__mode-btn--active]="brushMode() === 'erase'"
        (click)="brushMode() !== 'erase' && toggleBrushMode()"
      >
        <pf-icon name="close" [size]="14" />
        Radieren
      </button>
    </div>

    <div class="inpaint-panel__ctrl">
      <div class="inpaint-panel__ctrl-row">
        <span class="inpaint-panel__ctrl-label">Größe</span>
        <span class="inpaint-panel__ctrl-value">{{ brushSize() }}px</span>
      </div>
      <input type="range" [min]="5" [max]="100" [step]="1" [value]="brushSize()" (input)="onBrushSizeChange($event)" />
    </div>

    <button class="inpaint-panel__clear-btn" (click)="onClearMask()" [disabled]="!hasMask()">
      <pf-icon name="trash" [size]="13" />
      Maske löschen
    </button>
  </div>

  <!-- Prompt -->
  <div class="inpaint-panel__section">
    <div class="inpaint-panel__label">Prompt</div>
    <textarea
      class="inpaint-panel__textarea"
      rows="3"
      [value]="prompt()"
      placeholder="Was soll in den markierten Bereich? z.B. 'blauer Himmel', 'leer'"
      (input)="onPromptInput($event)"
    ></textarea>
  </div>

  <!-- Parameters -->
  <div class="inpaint-panel__section">
    <div class="inpaint-panel__label">Parameter</div>

    <div class="inpaint-panel__ctrl">
      <div class="inpaint-panel__ctrl-row">
        <span class="inpaint-panel__ctrl-label">Stärke</span>
        <span class="inpaint-panel__ctrl-value">{{ strength().toFixed(2) }}</span>
      </div>
      <input type="range" [min]="0.5" [max]="1.0" [step]="0.01" [value]="strength()" (input)="onStrengthChange($event)" />
    </div>

    <div class="inpaint-panel__ctrl">
      <div class="inpaint-panel__ctrl-row">
        <span class="inpaint-panel__ctrl-label">Schritte</span>
        <span class="inpaint-panel__ctrl-value">{{ steps() }}</span>
      </div>
      <input type="range" [min]="10" [max]="50" [step]="1" [value]="steps()" (input)="onStepsChange($event)" />
    </div>

    <div class="inpaint-panel__ctrl">
      <div class="inpaint-panel__ctrl-row">
        <span class="inpaint-panel__ctrl-label">CFG-Skala</span>
        <span class="inpaint-panel__ctrl-value">{{ guidance().toFixed(1) }}</span>
      </div>
      <input type="range" [min]="1" [max]="15" [step]="0.5" [value]="guidance()" (input)="onGuidanceChange($event)" />
    </div>
  </div>

  <!-- Hint -->
  @if (!hasMask()) {
    <div class="inpaint-panel__hint">
      <pf-icon name="info" [size]="14" />
      Male auf dem Bild, um den Bereich zu markieren, der ersetzt werden soll.
    </div>
  }

  <!-- Generate button -->
  <button
    class="inpaint-panel__generate"
    [disabled]="!canGenerate()"
    (click)="onGenerate()"
  >
    @if (generating()) {
      <div class="inpaint-panel__spinner"></div>
      Wird generiert …
    } @else {
      <pf-icon name="pencil" [size]="15" />
      Inpaint starten
    }
  </button>

</div>
